    ];

    document.getElementById('totalCount').textContent = QUESTION_BANK.length;

    let active = [];
    let idx = 0;
    let answers = {};
    let score = 0;
    let answered = new Set();

    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function startQuiz() {
      document.getElementById('launcher').classList.add('hidden');
      document.getElementById('quiz').classList.remove('hidden');
      restartQuiz();
    }

    function restartQuiz() {
      const raw = document.getElementById('countInput') ? document.getElementById('countInput').value.trim() : 'All';
      let n = QUESTION_BANK.length;
      if (raw && raw.toLowerCase() !== 'all' && !isNaN(Number(raw))) {
        n = Math.max(1, Math.min(QUESTION_BANK.length, parseInt(raw, 10)));
      }
      active = shuffle(QUESTION_BANK).slice(0, n);
      idx = 0;
      answers = {};
      score = 0;
      answered = new Set();
      render();
    }

    function currentQ() { return active[idx]; }

    function styleText(q) {
      if (q.type === 'mcq') return 'Choose ONE answer.';
      if (q.type === 'check') return 'Check ALL that apply.';
      return 'Fill in the blank.';
    }

    function escapeHtml(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function render() {
      const q = currentQ();
      document.getElementById('progress').textContent = `Question ${idx + 1} / ${active.length} · Score ${score} / ${answered.size}`;
      document.getElementById('sectionLabel').textContent = q.hw;
      document.getElementById('styleLabel').textContent = styleText(q);
      document.getElementById('questionBox').innerHTML = escapeHtml(q.q);
      const box = document.getElementById('optionsBox');
      const fb = document.getElementById('feedback');
      fb.innerHTML = '';
      box.innerHTML = '';

      if (q.type === 'mcq') {
        q.choices.forEach((choice, i) => {
          const checked = answers[q.id] === i ? 'checked' : '';
          box.innerHTML += `<label class="option"><input type="radio" name="mcq" value="${i}" ${checked}> ${escapeHtml(choice)}</label>`;
        });
      } else if (q.type === 'check') {
        const selected = Array.isArray(answers[q.id]) ? answers[q.id] : [];
        q.boxes.forEach((choice, i) => {
          const checked = selected.includes(i) ? 'checked' : '';
          box.innerHTML += `<label class="option"><input type="checkbox" value="${i}" ${checked}> ${escapeHtml(choice)}</label>`;
        });
      } else if (q.type === 'fitb') {
        const val = answers[q.id] || '';
        box.innerHTML = `<input id="fitbInput" type="text" value="${escapeHtml(val)}" placeholder="Type your answer here">`;
      }

      document.getElementById('prevBtn').disabled = idx === 0;
      document.getElementById('nextBtn').disabled = idx === active.length - 1;
    }

    function collectAnswer() {
      const q = currentQ();
      if (q.type === 'mcq') {
        const picked = document.querySelector('input[name="mcq"]:checked');
        return picked ? Number(picked.value) : null;
      }
      if (q.type === 'check') {
        return Array.from(document.querySelectorAll('#optionsBox input[type="checkbox"]:checked'))
          .map(x => Number(x.value))
          .sort((a, b) => a - b);
      }
      return document.getElementById('fitbInput').value.trim();
    }

    function arraysEqual(a, b) {
      return Array.isArray(a) && Array.isArray(b) && a.length === b.length && a.every((v, i) => v === b[i]);
    }

    function isCorrect(q, ans) {
      if (q.type === 'mcq') return ans === q.a;
      if (q.type === 'check') return arraysEqual(ans, q.correct.slice().sort((a, b) => a - b));
      const guess = String(ans || '');
      return q.accept.some(acc => q.ci ? guess.toLowerCase() === String(acc).toLowerCase() : guess === String(acc));
    }

    function submitAnswer() {
      const q = currentQ();
      const ans = collectAnswer();
      answers[q.id] = ans;
      const correct = isCorrect(q, ans);
      const firstTime = !answered.has(q.id);
      if (firstTime) {
        answered.add(q.id);
        if (correct) score += 1;
      }
      const fb = document.getElementById('feedback');
      let correctText = '';
      if (q.type === 'mcq') correctText = q.choices[q.a];
      else if (q.type === 'check') correctText = q.correct.map(i => q.boxes[i]).join('; ');
      else correctText = q.accept[0];
      fb.innerHTML = `
        <div class="${correct ? 'good' : 'bad'}" style="margin-top:16px;font-weight:bold;">
          ${correct ? 'Correct.' : 'Incorrect.'}
        </div>
        <div class="exp"><b>Answer:</b> ${escapeHtml(correctText)}<br><br><b>Explanation:</b> ${escapeHtml(q.exp || '')}</div>
      `;
      document.getElementById('progress').textContent = `Question ${idx + 1} / ${active.length} · Score ${score} / ${answered.size}`;
    }

    function nextQ() {
      if (idx < active.length - 1) { idx++; render(); }
    }

    function prevQ() {
      if (idx > 0) { idx--; render(); }
    }

    function finishQuiz() {
      alert(`Final score: ${score} / ${answered.size} answered.`);
    }
  </script>
